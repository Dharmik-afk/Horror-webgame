<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Raycaster</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- Start menu — visible by default, hidden on Play -->
  <div id="start-overlay">
    <div id="start-panel">
      <h1 class="start-title">RAYCASTER</h1>
      <ul class="threeD-button-set" id="start-menu-list" role="menu" aria-label="Main menu">
        <li role="none"><button id="start-play-btn" role="menuitem">Play</button></li>
        <li role="none"><button id="start-settings-btn" role="menuitem">Settings</button></li>
      </ul>
    </div>
  </div>

  <canvas id="c"></canvas>

  <div class="wasd-pad">
    <div class="key" data-key="w" tabindex="0">
      <span class="arrow">▲</span>
      <span class="label">W</span>
      <span class="hint">Forward</span>
    </div>
    <div class="key" data-key="a" tabindex="0">
      <span class="arrow">◀</span>
      <span class="label">A</span>
      <span class="hint">Left</span>
    </div>
    <div class="key" data-key="s" tabindex="0">
      <span class="arrow">▼</span>
      <span class="label">S</span>
      <span class="hint">Back</span>
    </div>
    <div class="key" data-key="d" tabindex="0">
      <span class="arrow">▶</span>
      <span class="label">D</span>
      <span class="hint">Right</span>
    </div>
  </div>

  <!-- Settings trigger -->
  <button id="cfg-btn" class="hud-btn" title="Settings" aria-label="Open settings">
    <svg width="16" height="16" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.8"
      stroke-linecap="round" stroke-linejoin="round">
      <line x1="3" y1="5" x2="15" y2="5" />
      <line x1="3" y1="9" x2="15" y2="9" />
      <line x1="3" y1="13" x2="15" y2="13" />
      <circle cx="7" cy="5" r="1.8" fill="currentColor" stroke="none" />
      <circle cx="11" cy="9" r="1.8" fill="currentColor" stroke="none" />
      <circle cx="6" cy="13" r="1.8" fill="currentColor" stroke="none" />
    </svg>
  </button>

  <!-- Fullscreen toggle -->
  <button id="fs-btn" class="hud-btn" title="Toggle fullscreen" aria-label="Toggle fullscreen">
    <svg id="fs-icon" width="16" height="16" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.8"
      stroke-linecap="round" stroke-linejoin="round">
      <polyline points="1,6 1,1 6,1" />
      <polyline points="12,1 17,1 17,6" />
      <polyline points="17,12 17,17 12,17" />
      <polyline points="6,17 1,17 1,12" />
    </svg>
  </button>

  <!-- Settings / pause overlay -->
  <div id="cfg-overlay" aria-hidden="true">
    <div id="cfg-panel" role="dialog" aria-label="Settings" aria-modal="true">

      <!-- ── Panel header ───────────────────────────────────────────── -->
      <div class="cfg-header">
        <span class="cfg-title-text">SETTINGS</span>
        <button class="cfg-close-btn" id="cfg-close-btn" aria-label="Close settings">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round">
            <line x1="1" y1="1" x2="13" y2="13" />
            <line x1="13" y1="1" x2="1" y2="13" />
          </svg>
        </button>
      </div>

      <!-- ── Two-column body ────────────────────────────────────────── -->
      <div class="cfg-body">

        <!-- Left nav -->
        <nav class="cfg-nav" aria-label="Settings categories">
          <!-- Populated dynamically by UI.section() -->
          <div class="cfg-nav-spacer"></div>
          <button class="cfg-3d-action" id="cfg-resume-btn">Resume</button>
        </nav>

        <!-- Right scrollable content -->
        <div class="cfg-content" id="cfg-content">
          <!-- Populated dynamically by UI.section() -->
        </div><!-- /.cfg-content -->
      </div><!-- /.cfg-body -->

    </div>
  </div>

  <script src="ui.js"></script>
  <script src="js/ui/settings.js"></script>
  <script src="js/ui/start-menu.js"></script>

  <script type="module" src="main.js"></script>
</body>

</html>
